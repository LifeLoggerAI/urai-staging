name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  functions:
    name: Functions and staging readiness checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Setup Java for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Bootstrap staging validation
        run: node scripts/urai-staging-bootstrap.mjs

      - name: Validate launch evidence
        run: node scripts/validate-launch-evidence.mjs

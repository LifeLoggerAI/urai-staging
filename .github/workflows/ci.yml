name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  functions:
    name: Functions and staging readiness checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Setup Java for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Bootstrap staging validation
        run: node scripts/urai-staging-bootstrap.mjs

      - name: Validate launch evidence
        run: node scripts/validate-launch-evidence.mjs

      - name: Upload staging launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-staging-launch-evidence
          path: |
            artifacts/launch/staging-bootstrap-report.json
            artifacts/launch/staging-bootstrap-summary.md
          if-no-files-found: warn
